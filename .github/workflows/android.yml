on:
  push:
    branches:
      - master

name: Build My Apps

jobs:
  build:
    name: Build and Release new apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '11'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/*"
          tag: v0.0.1
          token: ${{ secrets.TOKEN }}      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Find APK files
        run: find . -name "*.apk"

      - name: Show build outputs
        run: ls -R app/build/outputs || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Release-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error        run: find . -name "*.apk"

      - name: Show build outputs
        run: ls -R app/build/outputs || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error      with:
        name: Calculator-Release-APK
        # Sahi aur exact path jahan Android Gradle plugin APK save karta hai
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error

    # 6. APK file ko upload karna (Taki aap download kar sakein)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        # Path ko fix kiya gaya hai:
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error # Agar file nahi mili toh build fail dikhayega
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
