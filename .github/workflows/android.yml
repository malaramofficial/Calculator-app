name: Android Release Build

on:
  push:
    branches: [ "main" ] # Agar aapki branch ka naam 'master' hai toh yahan badal dein
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository se code checkout karna
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Java setup karna (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradle wrapper ko execute karne ki permission dena
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. APK Build karna (Yahan se asli file banti hai)
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    # 5. Build hone ke baad file check karna (Debug purpose ke liye)
    - name: List build folder
      run: ls -R app/build/outputs/apk/

    # 6. APK file ko upload karna (Taki aap download kar sakein)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        # Path ko fix kiya gaya hai:
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error # Agar file nahi mili toh build fail dikhayega
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
