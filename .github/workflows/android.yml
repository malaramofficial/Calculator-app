name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]

  pull_request:
    branches: [ "main", "master" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Find APK files
        run: find . -name "*.apk"

      - name: Show build outputs
        run: ls -R app/build/outputs || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          if-no-files-found: error      with:
        name: Calculator-Release-APK
        # Sahi aur exact path jahan Android Gradle plugin APK save karta hai
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error

    # 6. APK file ko upload karna (Taki aap download kar sakein)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        # Path ko fix kiya gaya hai:
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error # Agar file nahi mili toh build fail dikhayega
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
